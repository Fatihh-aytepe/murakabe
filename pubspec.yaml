name: murakabe
description: Günlük İslami İbadet Hatırlatıcı
publish_to: 'none'
version: 1.1.5+1
environment:
  sdk: '>=3.0.0 <4.0.0'

dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Firebase
  firebase_core: ^4.8.0
  firebase_auth: ^6.5.0
  cloud_firestore: ^6.4.0
  firebase_remote_config: ^6.5.0

  # Update
  package_info_plus: ^8.0.0
  url_launcher: ^6.2.5
  syncfusion_flutter_pdfviewer: 33.2.5

  # Local DB
  sqflite: ^2.3.0
  path: ^1.8.3

  # Storage
  shared_preferences: ^2.2.2

  # Notifications & Alarm
  flutter_local_notifications: ^17.2.4

  # UI
  google_fonts: ^6.1.0
  flutter_svg: ^2.0.9
  lottie: ^2.7.0
  animate_do: ^3.1.2

  # State Management
  provider: ^6.1.1

  # Utils
  intl: ^0.20.0
  uuid: ^4.2.2
  connectivity_plus: ^5.0.2
  permission_handler: ^11.1.0
  timezone: ^0.9.2
  image_picker: ^1.1.2

  # Namaz Vakitleri & Konum
  geolocator: ^12.0.0
  adhan: ^2.0.0+1
  audioplayers: ^5.2.1
  http: ^1.2.0

dev_dependencies:
  flutter_test:
    sdk: flutter
  flutter_lints: ^3.0.0
  flutter_launcher_icons: ^0.13.1
  mockito: ^5.4.4

flutter_launcher_icons:
  android: true
  ios: false
  image_path: "assets/images/yenilogo.png"

flutter:
  uses-material-design: true
  assets:
    - assets/images/
    - assets/data/ayetler.json
    - assets/data/hadisler.json
    - assets/data/esmaul_husna.json
    - assets/sounds/
    - assets/tefsir/tefhimul_kuran.pdf
    
    
    